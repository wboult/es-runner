import org.gradle.api.logging.Logging
import org.gradle.api.tasks.testing.TestDescriptor
import org.gradle.api.tasks.testing.TestListener
import org.gradle.api.tasks.testing.TestResult
import org.gradle.api.tasks.testing.logging.TestExceptionFormat

class TestResultLogger implements TestListener {
    private final logger = Logging.getLogger(TestResultLogger)

    @Override
    void beforeSuite(TestDescriptor descriptor) {
    }

    @Override
    void afterSuite(TestDescriptor descriptor, TestResult result) {
        if (descriptor.parent == null) {
            def durationMs = result.endTime - result.startTime
            logger.lifecycle("TEST SUMMARY: ${result.resultType} (${result.testCount} tests, ${result.successfulTestCount} passed, ${result.failedTestCount} failed, ${result.skippedTestCount} skipped) ${durationMs} ms")
        }
    }

    @Override
    void beforeTest(TestDescriptor descriptor) {
    }

    @Override
    void afterTest(TestDescriptor descriptor, TestResult result) {
        if (descriptor.className != null) {
            def durationMs = result.endTime - result.startTime
            logger.lifecycle("TEST ${descriptor.className}.${descriptor.name} (${result.resultType}) ${durationMs} ms")
        }
    }
}

plugins {
    id 'java-library'
    id 'scala'
    id 'org.jetbrains.kotlin.jvm' version '1.9.24'
    id 'maven-publish'
    id 'signing'
}

group = 'io.github.wboult'
version = providers.gradleProperty("releaseVersion").orElse("0.1.0").get()
description = 'Local Elasticsearch distribution runner for tests and tooling.'

def centralPublishingEnabled = providers.gradleProperty("enableCentralPublishing")
        .map { it.toBoolean() }
        .orElse(false)
def centralPortalUsername = providers.gradleProperty("centralPortalUsername")
        .orElse(providers.environmentVariable("CENTRAL_PORTAL_USERNAME"))
def centralPortalPassword = providers.gradleProperty("centralPortalPassword")
        .orElse(providers.environmentVariable("CENTRAL_PORTAL_PASSWORD"))

ext.configurePomMetadata = { publication, Project targetProject, String publicationName = targetProject.name, String publicationDescription = targetProject.description ->
    publication.pom {
        name = publicationName
        description = publicationDescription
        url = 'https://github.com/wboult/es-runner'
        licenses {
            license {
                name = 'MIT License'
                url = 'https://opensource.org/license/mit/'
            }
        }
        developers {
            developer {
                id = 'wboult'
                name = 'Will Boulter'
                url = 'https://github.com/wboult'
            }
        }
        scm {
            connection = 'scm:git:https://github.com/wboult/es-runner.git'
            developerConnection = 'scm:git:ssh://git@github.com/wboult/es-runner.git'
            url = 'https://github.com/wboult/es-runner'
        }
    }
}

ext.configurePublishingRepositories = { repositoryHandler ->
    def sampleRepoUrl = providers.gradleProperty("sampleRepoUrl").orNull
    if (sampleRepoUrl != null) {
        repositoryHandler.maven {
            name = "sampleRepo"
            url = uri(sampleRepoUrl)
        }
    }

    if (centralPublishingEnabled.get() || (centralPortalUsername.isPresent() && centralPortalPassword.isPresent())) {
        repositoryHandler.maven {
            name = "ossrhStagingApi"
            url = uri("https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/")
            credentials {
                username = centralPortalUsername.orNull
                password = centralPortalPassword.orNull
            }
        }
    }
}

ext.configureSigning = { Project targetProject ->
    def signingKey = targetProject.providers.gradleProperty("signingKey")
            .orElse(targetProject.providers.environmentVariable("SIGNING_KEY"))
            .orNull
    def signingPassword = targetProject.providers.gradleProperty("signingPassword")
            .orElse(targetProject.providers.environmentVariable("SIGNING_PASSWORD"))
            .orNull

    targetProject.signing {
        required = false
        if (signingKey != null && signingPassword != null) {
            useInMemoryPgpKeys(signingKey, signingPassword)
            sign(targetProject.publishing.publications)
        }
    }

    targetProject.tasks.withType(org.gradle.plugins.signing.Sign).configureEach {
        onlyIf { signingKey != null && signingPassword != null }
    }
}

def libsCatalog = project.extensions.getByType(org.gradle.api.artifacts.VersionCatalogsExtension).named("libs")
def defaultScalaVersion = libsCatalog.findVersion("scala").get().requiredVersion
def defaultSparkVersion = libsCatalog.findVersion("spark").get().requiredVersion
def defaultScala3Version = libsCatalog.findVersion("scala3").get().requiredVersion
def scalaVersionEffective = (findProperty("scalaVersion") ?: defaultScalaVersion).toString()
def sparkVersionEffective = (findProperty("sparkVersion") ?: defaultSparkVersion).toString()
def scala3VersionEffective = (findProperty("scala3Version") ?: defaultScala3Version).toString()
def excludedJunitTags = System.getProperty("junit.jupiter.excludeTags", "")
        .split(",")
        .collect { it.trim() }
        .findAll { !it.isEmpty() }
def scalaBinaryVersionEffective = scalaVersionEffective.split("\\.").take(2).join(".")
if (!(scalaBinaryVersionEffective in ["2.12", "2.13"])) {
    throw new GradleException("Unsupported Scala version: ${scalaVersionEffective}")
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
    withJavadocJar()
}

kotlin {
    jvmToolchain(17)
}

sourceSets {
    scala3Test {
        scala.srcDir("src/test/scala3")
        resources.srcDir("src/test/scala3/resources")
    }
}

configurations {
    scala3Compiler
}

dependencies {
    testImplementation libs.junit.jupiter
    testRuntimeOnly libs.junit.platform.launcher
    if (findProperty("scalaVersion") != null || findProperty("sparkVersion") != null) {
        testImplementation "org.scala-lang:scala-library:${scalaVersionEffective}"
        testImplementation "org.apache.spark:spark-sql_${scalaBinaryVersionEffective}:${sparkVersionEffective}"
    } else {
        testImplementation libsCatalog.findLibrary("scala-library").get()
        def sparkAlias = scalaBinaryVersionEffective == "2.12" ? "spark-sql-212" : "spark-sql-213"
        testImplementation libsCatalog.findLibrary(sparkAlias).get()
    }
    if (findProperty("scala3Version") != null) {
        scala3TestImplementation "org.scala-lang:scala3-library_3:${scala3VersionEffective}"
        scala3Compiler "org.scala-lang:scala3-compiler_3:${scala3VersionEffective}"
        scala3Compiler "org.scala-lang:scala3-sbt-bridge:${scala3VersionEffective}"
    } else {
        scala3TestImplementation libsCatalog.findLibrary("scala3-library").get()
        scala3Compiler libsCatalog.findLibrary("scala3-compiler").get()
        scala3Compiler libsCatalog.findLibrary("scala3-sbt-bridge").get()
    }
    scala3TestImplementation libs.junit.jupiter
    scala3TestRuntimeOnly libs.junit.platform.launcher
}

sourceSets.scala3Test {
    compileClasspath += sourceSets.main.output + sourceSets.test.output
    runtimeClasspath += sourceSets.main.output + sourceSets.test.output
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 17
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions.jvmTarget = "17"
}

tasks.withType(ScalaCompile).configureEach {
    scalaCompileOptions.additionalParameters = ["-target:jvm-1.8"]
    if (name == "compileScala3TestScala") {
        scalaClasspath = configurations.scala3Compiler
        dependsOn tasks.compileTestJava
    }
}

tasks.withType(Test).configureEach {
    useJUnitPlatform {
        if (!excludedJunitTags.isEmpty()) {
            excludeTags(*excludedJunitTags)
        }
    }
    binaryResultsDirectory.set(
            layout.buildDirectory.dir("test-results/${name}/binary-${System.getProperty('user.name', 'user')}")
    )
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat = TestExceptionFormat.FULL
        showExceptions = true
        showCauses = true
        showStackTraces = true
    }
    jvmArgs(
        "--add-opens=java.base/java.nio=ALL-UNNAMED",
        "--add-exports=java.base/sun.nio.ch=ALL-UNNAMED"
    )
    addTestListener(new TestResultLogger())
}

tasks.register("scala3Test", Test) {
    description = "Runs the Scala 3 tests."
    group = "verification"
    testClassesDirs = sourceSets.scala3Test.output.classesDirs
    classpath = sourceSets.scala3Test.runtimeClasspath
    shouldRunAfter tasks.test
}

tasks.named("check").configure {
    dependsOn tasks.named("scala3Test")
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            rootProject.ext.configurePomMetadata(delegate, project, 'ES Runner', project.description)
        }
    }
    repositories {
        rootProject.ext.configurePublishingRepositories(delegate)
    }
}

rootProject.ext.configureSigning(project)

def resolvedPublicationVersion = version.toString()

tasks.register("printResolvedVersion") {
    description = "Prints the version that will be used for publication."
    group = "help"
    doLast {
        println(resolvedPublicationVersion)
    }
}

tasks.register("publishReleasePublicationsToMavenLocal") {
    description = "Publishes the release artifacts for all publishable modules to Maven Local."
    group = "publishing"
    dependsOn(
            tasks.named("publishToMavenLocal"),
            project(":es-runner-java-client").tasks.named("publishToMavenLocal"),
            project(":es-runner-gradle-test-support").tasks.named("publishToMavenLocal"),
            project(":es-runner-gradle-plugin").tasks.named("publishToMavenLocal")
    )
}

if (centralPublishingEnabled.get() || (centralPortalUsername.isPresent() && centralPortalPassword.isPresent())) {
    tasks.register("publishReleasePublicationsToCentralStaging") {
        description = "Publishes the release artifacts for all publishable modules to the Sonatype OSSRH staging compatibility service."
        group = "publishing"
        dependsOn(
                tasks.named("publishAllPublicationsToOssrhStagingApiRepository"),
                project(":es-runner-java-client").tasks.named("publishAllPublicationsToOssrhStagingApiRepository"),
                project(":es-runner-gradle-test-support").tasks.named("publishAllPublicationsToOssrhStagingApiRepository"),
                project(":es-runner-gradle-plugin").tasks.named("publishAllPublicationsToOssrhStagingApiRepository")
        )
    }
}

