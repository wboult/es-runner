plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
}

group = rootProject.group
version = rootProject.version
description = 'Test-side namespace and connection helpers for the ES Runner Gradle plugin.'

dependencies {
    api project(':')

    testImplementation libs.junit.jupiter
    testRuntimeOnly libs.junit.platform.launcher
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
    withJavadocJar()
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            rootProject.ext.configurePomMetadata(delegate, project, 'ES Runner Gradle Test Support', project.description)
        }
    }
    repositories {
        rootProject.ext.configurePublishingRepositories(delegate)
    }
}

rootProject.ext.configureSigning(project)
