name: CI (feature)

on:
  push:
    branches:
      - "feature/**"
      - "codex/**"
  workflow_dispatch:
    inputs:
      versions:
        description: 'JSON array of Elasticsearch versions (keep this to the latest 9.x and latest 8.x only, e.g. ["9.3.1","8.19.11"])'
        required: false
        default: '["9.3.1","8.19.11"]'

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.list }}
    steps:
      - name: Resolve version matrix
        id: versions
        env:
          VERSIONS: ${{ inputs.versions }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -c 'import json, os; raw=os.environ.get("VERSIONS"); output=(raw if raw and "\"" in raw else json.dumps([i.strip() for i in raw.strip("[]").split(",") if i.strip()])) if raw else json.dumps(["9.3.1","8.19.11"]); print(f"list={output}")' >> "$GITHUB_OUTPUT"
          else
            echo 'list=["9.3.1","8.19.11"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        es_version: ${{ fromJson(needs.resolve-matrix.outputs.versions) }}
        scala_spark:
          - scala: "2.12.21"
            spark: "3.5.8"
          - scala: "2.13.18"
            spark: "3.5.8"
          - scala: "2.13.18"
            spark: "4.1.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Elasticsearch distro
        uses: actions/cache@v4
        with:
          path: distros
          key: es-distro-${{ runner.os }}-${{ matrix.es_version }}

      - name: Prime local Elasticsearch distro
        run: |
          mkdir -p distros
          archive="distros/elasticsearch-${{ matrix.es_version }}-linux-x86_64.tar.gz"
          if [ ! -f "$archive" ]; then
            curl -fsSL "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-${{ matrix.es_version }}-linux-x86_64.tar.gz" -o "$archive"
          fi

      - name: Run tests
        env:
          ES_VERSION: ${{ matrix.es_version }}
          ES_DISTROS_DIR: distros
          ES_DISTRO_DOWNLOAD: "true"
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          :test
          :es-runner-gradle-plugin:test
          :es-runner-gradle-test-support:test
          -Djunit.jupiter.excludeTags=stress
          -PscalaVersion=${{ matrix.scala_spark.scala }}
          -PsparkVersion=${{ matrix.scala_spark.spark }}

  scala3-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Elasticsearch distro
        uses: actions/cache@v4
        with:
          path: distros
          key: es-distro-${{ runner.os }}-9.3.1

      - name: Run Scala 3 tests
        env:
          ES_VERSION: "9.3.1"
          ES_DISTROS_DIR: distros
          ES_DISTRO_DOWNLOAD: "true"
        run: ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME" ./gradlew scala3Test

  publication-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify release publications
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          publishReleasePublicationsToMavenLocal
          :es-runner-gradle-plugin:validatePlugins

  plugin-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Elasticsearch distro
        uses: actions/cache@v4
        with:
          path: distros
          key: es-distro-${{ runner.os }}-9.3.1

      - name: Prime local Elasticsearch distro
        run: |
          mkdir -p distros
          archive="distros/elasticsearch-9.3.1-linux-x86_64.tar.gz"
          if [ ! -f "$archive" ]; then
            curl -fsSL "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-9.3.1-linux-x86_64.tar.gz" -o "$archive"
          fi

      - name: Run plugin install integration test
        env:
          ES_VERSION: "9.3.1"
          ES_DISTROS_DIR: distros
          ES_DISTRO_DOWNLOAD: "true"
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          :test
          --tests io.github.wboult.esrunner.ElasticRunnerPluginInstallIntegrationTest

  opensearch-process:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_version: "3.5.0"
            java_version: "21"
          - os_version: "2.19.4"
            java_version: "21"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}
          cache: gradle

      - name: Cache OpenSearch distro
        uses: actions/cache@v4
        with:
          path: distros
          key: opensearch-distro-${{ runner.os }}-${{ matrix.os_version }}

      - name: Prime local OpenSearch distro
        run: |
          mkdir -p distros
          archive="distros/opensearch-${{ matrix.os_version }}-linux-x64.tar.gz"
          if [ ! -f "$archive" ]; then
            curl -fsSL "https://artifacts.opensearch.org/releases/bundle/opensearch/${{ matrix.os_version }}/opensearch-${{ matrix.os_version }}-linux-x64.tar.gz" -o "$archive"
          fi

      - name: Run OpenSearch smoke tests
        env:
          OPENSEARCH_VERSION: ${{ matrix.os_version }}
          OPENSEARCH_DISTROS_DIR: distros
          OPENSEARCH_DISTRO_DOWNLOAD: "true"
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          :test
          --tests io.github.wboult.esrunner.OpenSearchRunnerIntegrationTest
          --tests io.github.wboult.esrunner.ReadmeOpenSearchExampleTest

  embedded-jdk17:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache embedded distros (JDK 17)
        uses: actions/cache@v4
        with:
          path: distros/embedded
          key: embedded-jdk17-${{ runner.os }}-es8.19.11-os2.19.4

      - name: Prime embedded distros (JDK 17)
        run: |
          mkdir -p distros/embedded
          es_archive="distros/embedded/elasticsearch-8.19.11-linux-x86_64.tar.gz"
          if [ ! -f "$es_archive" ]; then
            curl -fsSL "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-8.19.11-linux-x86_64.tar.gz" -o "$es_archive"
          fi
          if [ ! -d "distros/embedded/elasticsearch-8.19.11" ]; then
            tar -xzf "$es_archive" -C distros/embedded
          fi

          os_archive="distros/embedded/opensearch-2.19.4-linux-x64.tar.gz"
          if [ ! -f "$os_archive" ]; then
            curl -fsSL "https://artifacts.opensearch.org/releases/bundle/opensearch/2.19.4/opensearch-2.19.4-linux-x64.tar.gz" -o "$os_archive"
          fi
          if [ ! -d "distros/embedded/opensearch-2.19.4" ]; then
            tar -xzf "$os_archive" -C distros/embedded
          fi

      - name: Run embedded tests (JDK 17)
        env:
          ES_EMBEDDED_HOME_8: ${{ github.workspace }}/distros/embedded/elasticsearch-8.19.11
          OPENSEARCH_EMBEDDED_HOME_2: ${{ github.workspace }}/distros/embedded/opensearch-2.19.4
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          :es-runner-embedded-common:test
          :es-runner-embedded-8:test
          :es-runner-embedded-opensearch-2:test

  embedded-jdk21:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Cache embedded distros (JDK 21)
        uses: actions/cache@v4
        with:
          path: distros/embedded
          key: embedded-jdk21-${{ runner.os }}-es9.3.1-os3.5.0

      - name: Prime embedded distros (JDK 21)
        run: |
          mkdir -p distros/embedded
          es_archive="distros/embedded/elasticsearch-9.3.1-linux-x86_64.tar.gz"
          if [ ! -f "$es_archive" ]; then
            curl -fsSL "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-9.3.1-linux-x86_64.tar.gz" -o "$es_archive"
          fi
          if [ ! -d "distros/embedded/elasticsearch-9.3.1" ]; then
            tar -xzf "$es_archive" -C distros/embedded
          fi

          os_archive="distros/embedded/opensearch-3.5.0-linux-x64.tar.gz"
          if [ ! -f "$os_archive" ]; then
            curl -fsSL "https://artifacts.opensearch.org/releases/bundle/opensearch/3.5.0/opensearch-3.5.0-linux-x64.tar.gz" -o "$os_archive"
          fi
          if [ ! -d "distros/embedded/opensearch-3.5.0" ]; then
            tar -xzf "$os_archive" -C distros/embedded
          fi

      - name: Run embedded tests (JDK 21)
        env:
          ES_EMBEDDED_HOME_9: ${{ github.workspace }}/distros/embedded/elasticsearch-9.3.1
          OPENSEARCH_EMBEDDED_HOME_3: ${{ github.workspace }}/distros/embedded/opensearch-3.5.0
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          :es-runner-embedded-9:test
          :es-runner-embedded-opensearch-3:test

