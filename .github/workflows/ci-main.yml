name: CI (main)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      versions:
        description: 'JSON array of Elasticsearch versions (e.g. ["9.2.4","9.2.3","8.9.2"])'
        required: false
        default: '["9.2.4","9.2.3","8.9.2"]'

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.list }}
    steps:
      - name: Resolve version matrix
        id: versions
        env:
          VERSIONS: ${{ inputs.versions }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -c 'import json, os; raw=os.environ.get("VERSIONS"); output=(raw if raw and "\"" in raw else json.dumps([i.strip() for i in raw.strip("[]").split(",") if i.strip()])) if raw else json.dumps(["9.2.4","9.2.3","8.9.2"]); print(f"list={output}")' >> "$GITHUB_OUTPUT"
          else
            echo 'list=["9.2.4","9.2.3","8.9.2"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        es_version: ${{ fromJson(needs.resolve-matrix.outputs.versions) }}
        scala_spark:
          - scala: "2.12.21"
            spark: "3.5.3"
          - scala: "2.13.18"
            spark: "3.5.3"
          - scala: "2.13.18"
            spark: "4.0.0"
          - scala: "2.13.18"
            spark: "4.1.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Elasticsearch distro
        uses: actions/cache@v4
        with:
          path: distros
          key: es-distro-${{ runner.os }}-${{ matrix.es_version }}

      - name: Prime local Elasticsearch distro
        run: |
          mkdir -p distros
          archive="distros/elasticsearch-${{ matrix.es_version }}-linux-x86_64.tar.gz"
          if [ ! -f "$archive" ]; then
            curl -fsSL "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-${{ matrix.es_version }}-linux-x86_64.tar.gz" -o "$archive"
          fi

      - name: Run tests
        env:
          ES_VERSION: ${{ matrix.es_version }}
          ES_DISTROS_DIR: distros
          ES_DISTRO_DOWNLOAD: "true"
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          :test
          :elastic-runner-gradle-plugin:test
          :elastic-runner-gradle-test-support:test
          -PscalaVersion=${{ matrix.scala_spark.scala }}
          -PsparkVersion=${{ matrix.scala_spark.spark }}

  scala3-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Elasticsearch distro
        uses: actions/cache@v4
        with:
          path: distros
          key: es-distro-${{ runner.os }}-9.2.4

      - name: Run Scala 3 tests
        env:
          ES_VERSION: "9.2.4"
          ES_DISTROS_DIR: distros
          ES_DISTRO_DOWNLOAD: "true"
        run: ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME" ./gradlew scala3Test
