name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to verify locally (for example 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="${{ inputs.release_version }}"
          fi

          if [ -z "$release_version" ]; then
            echo "Release version must not be empty" >&2
            exit 1
          fi

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify release publications
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          -PreleaseVersion="$RELEASE_VERSION"
          publishReleasePublicationsToMavenLocal
          :es-runner-gradle-plugin:validatePlugins
          :es-runner-gradle-plugin-docker:validatePlugins

      - name: Publish release artifacts to Maven Central staging compatibility service
        if: github.event_name == 'push'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          -PreleaseVersion="$RELEASE_VERSION"
          -PenableCentralPublishing=true
          publishReleasePublicationsToCentralStaging

      - name: Finalize Maven Central upload
        if: github.event_name == 'push'
        env:
          CENTRAL_NAMESPACE: ${{ secrets.CENTRAL_NAMESPACE }}
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: bash scripts/release/finalize-central-upload.sh

      - name: Publish Gradle plugin
        if: github.event_name == 'push'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: >
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS="$JAVA_HOME"
          ./gradlew
          -PreleaseVersion="$RELEASE_VERSION"
          :es-runner-gradle-plugin:publishPlugins
          :es-runner-gradle-plugin-docker:publishPlugins

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "ES Runner ${RELEASE_VERSION}"
