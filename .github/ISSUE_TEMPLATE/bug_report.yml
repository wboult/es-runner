name: Bug report
description: Report a defect or behavioral regression in Elastic Runner.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the problem.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
      placeholder: Elastic Runner timed out waiting for Elasticsearch even though the process was running.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reproducible example you can.
      placeholder: |
        1. Configure ElasticRunnerConfig with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The cluster should start and return a base URI.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste relevant logs, log tails, or exceptions.
      render: text
  - type: input
    id: jdk
    attributes:
      label: JDK version
      placeholder: "17.0.17"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
  - type: input
    id: elasticsearch
    attributes:
      label: Elasticsearch version
      placeholder: "9.3.1"
  - type: input
    id: build_tool
    attributes:
      label: Build tool and version
      placeholder: Gradle 9.1.0
